name: Deploy openwork.software

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-openwork-software
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy from dev
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Optional. If set and incorrect, Vercel will return 403.
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          # Prefer GitHub context over hardcoded IDs.
          GITHUB_REPO_ID: "${{ github.repository_id }}"
          VERCEL_PROJECT: openwork-software
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "Missing secrets.VERCEL_TOKEN" >&2
            exit 1
          fi

          payload=$(python3 -c 'import json,os; print(json.dumps({
            "name": os.environ["VERCEL_PROJECT"],
            "project": os.environ["VERCEL_PROJECT"],
            "target": "production",
            "gitSource": {
              "type": "github",
              "repoId": int(os.environ["GITHUB_REPO_ID"]),
              "ref": "dev"
            }
          }))')

          api_base="https://api.vercel.com"

          post_deployments() {
            local url="${api_base}/v13/deployments"
            if [ -n "${VERCEL_TEAM_ID:-}" ]; then
              url="${url}?teamId=${VERCEL_TEAM_ID}"
            fi

            curl -sS -w "\n%{http_code}" -X POST "${url}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${payload}"
          }

          resp_with_code=$(post_deployments)
          http_code=$(tail -n 1 <<<"${resp_with_code}")
          resp=$(head -n -1 <<<"${resp_with_code}")

          if [ "${http_code}" = "403" ] && [ -n "${VERCEL_TEAM_ID:-}" ]; then
            echo "Vercel returned 403 for teamId=${VERCEL_TEAM_ID}; retrying without VERCEL_TEAM_ID." >&2
            unset VERCEL_TEAM_ID
            resp_with_code=$(post_deployments)
            http_code=$(tail -n 1 <<<"${resp_with_code}")
            resp=$(head -n -1 <<<"${resp_with_code}")
          fi

          if [ "${http_code}" -ge 400 ]; then
            echo "Vercel deployment trigger failed (HTTP ${http_code})." >&2
            echo "Response: ${resp}" >&2
            echo "Hint: check GitHub secrets VERCEL_TOKEN and (optional) VERCEL_TEAM_ID." >&2
            exit 1
          fi

          deployment_id=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"${resp}")
          deployment_url=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["url"])' <<<"${resp}")

          echo "Triggered production deployment: ${deployment_id}" 
          echo "Deployment URL: https://${deployment_url}"

          # Wait for READY so the production alias updates.
          get_deployment() {
            local url="${api_base}/v13/deployments/${deployment_id}"
            if [ -n "${VERCEL_TEAM_ID:-}" ]; then
              url="${url}?teamId=${VERCEL_TEAM_ID}"
            fi
            curl -sS -w "\n%{http_code}" "${url}" -H "Authorization: Bearer ${VERCEL_TOKEN}"
          }

          for i in $(seq 1 40); do
            resp_with_code=$(get_deployment)
            http_code=$(tail -n 1 <<<"${resp_with_code}")
            resp=$(head -n -1 <<<"${resp_with_code}")

            if [ "${http_code}" = "403" ] && [ -n "${VERCEL_TEAM_ID:-}" ]; then
              echo "Vercel returned 403 when polling with teamId=${VERCEL_TEAM_ID}; retrying without VERCEL_TEAM_ID." >&2
              unset VERCEL_TEAM_ID
              resp_with_code=$(get_deployment)
              http_code=$(tail -n 1 <<<"${resp_with_code}")
              resp=$(head -n -1 <<<"${resp_with_code}")
            fi

            if [ "${http_code}" -ge 400 ]; then
              echo "Vercel deployment poll failed (HTTP ${http_code})." >&2
              echo "Response: ${resp}" >&2
              exit 1
            fi

            state=$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("readyState"))' <<<"${resp}")

            echo "${i}/40 readyState=${state}"

            if [ "${state}" = "READY" ]; then
              echo "Deployment is READY. openwork.software should be updated." 
              exit 0
            fi
            if [ "${state}" = "ERROR" ]; then
              echo "Deployment failed." >&2
              exit 1
            fi
            sleep 15
          done

          echo "Timed out waiting for deployment to become READY." >&2
          exit 1
